        body { margin: 0; background: #000; color: white; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; background: #000; }
        
        .logo { 
            position: absolute; top: 30px; right: 40px; 
            font-weight: bold; font-size: 24px; color: rgba(255,255,255,0.4); 
            z-index: 15; text-shadow: 2px 2px 4px #000;
        }

        /* Cuadro de información del video (EPG) */
        .epg-guide {
            position: absolute; bottom: 50px; left: 50px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 15px 25px; border-left: 5px solid #ff0000;
            z-index: 20; min-width: 350px; display: none;
        }

        /* Cortinilla entre videos */
        .bumper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: none; 
            justify-content: center; align-items: center;
            font-size: 40px; font-weight: bold; z-index: 25;
        }
        .bumper span { color: #ff0000; margin-left: 15px; }

        .btn-inicio { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; padding: 25px 50px; font-size: 24px; 
            background: #ff0000; color: white; border: none; cursor: pointer;

        function cargarVideo(indice, startTime) {
            var videoInfo = listaVideos[indice];
            var proximo = listaVideos[(indice + 1) % listaVideos.length];
            
            // Actualizar interfaz
            currentTitle.innerHTML = videoInfo.nombre;
            nextTitle.innerHTML = "Siguiente: " + proximo.nombre;
            
            // Cargar archivo
            player.src = videoInfo.url;
            player.load();

            player.onloadedmetadata = function() {
                if (startTime > 0) { player.currentTime = startTime; }
                player.play();
                
                // Mostrar info del video por 6 segundos
                epg.style.display = 'block';
                setTimeout(function() { epg.style.display = 'none'; }, 6000);
            };
        }

        // Al presionar el botón de inicio
        btn.onclick = function() {
            btn.style.display = 'none';
            player.muted = false;
            cargarVideo(indiceActual, tiempoGuardado);
        };

        // EVENTO CLAVE: CUANDO TERMINA UN VIDEO
        player.onended = function() {
            // 1. Calcular el siguiente índice
            indiceActual = (indiceActual + 1) % listaVideos.length;
            
            // 2. Guardar progreso (video nuevo, tiempo 0)
            localStorage.setItem('nativux_index', indiceActual);
            localStorage.setItem('nativux_time', 0);
            
            // 3. Mostrar cortinilla de "Sintonizando"
            bumper.style.display = 'flex';
            
            // 4. Esperar 3 segundos y cargar el siguiente
            setTimeout(function() {
                cargarVideo(indiceActual, 0);
                setTimeout(function() { bumper.style.display = 'none'; }, 1000);
            }, 3000);
        };

        // Guardado constante del tiempo actual
        player.ontimeupdate = function() { 
            if (!player.seeking) {
                localStorage.setItem('nativux_index', indiceActual);
                localStorage.setItem('nativux_time', player.currentTime);
            }
        };

        // Bloqueo de menú contextual para evitar distracciones en TV
        document.oncontextmenu = function() { return false; };
