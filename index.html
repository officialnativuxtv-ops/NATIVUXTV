<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>NATIVUX TV - Señal en Vivo</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; background: #000; cursor: none; }
        
        /* LOGO DEL CANAL */
        .logo {
            position: absolute; top: 30px; right: 40px;
            font-weight: bold; font-size: 24px; color: rgba(255,255,255,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 15;
            letter-spacing: 2px; pointer-events: none;
        }

        /* GUÍA DE PROGRAMACIÓN (EPG) */
        .epg-guide {
            position: absolute; bottom: 50px; left: 50px;
            background: rgba(0, 0, 0, 0.85); color: white;
            padding: 20px; border-radius: 2px; border-left: 6px solid #ff0000;
            z-index: 20; min-width: 300px;
            transform: translateX(-120%); transition: transform 0.8s ease-in-out;
        }
        .epg-guide.active { transform: translateX(0); }
        .epg-now { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        .epg-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .epg-next { font-size: 14px; color: #00ff00; border-top: 1px solid #333; padding-top: 10px; }

        /* CORTINILLA (BUMPER) DE TRANSICIÓN */
        .bumper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center;
            font-size: 40px; font-weight: bold; z-index: 25; letter-spacing: 3px;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(255,0,0,0.8);
        }
        .bumper.active { opacity: 1; pointer-events: all; }
        .bumper span { color: #ff0000; margin-left: 10px; }

        .overlay-click { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .btn-inicio { position: absolute; z-index: 30; padding: 15px 35px; font-size: 18px; background: #ff0000; color: white; border: none; cursor: pointer; font-weight: bold; letter-spacing: 1px; border-radius: 5px; }
    </style>
</head>

        // Validar que el índice guardado no sea mayor que la lista actual de videos
        if (indiceActual >= listaVideos.length) {
            indiceActual = 0;
            tiempoGuardado = 0;
        }

        function mostrarEPG() {
            epg.classList.add('active');
            setTimeout(() => {
                epg.classList.remove('active');
            }, 6000); // Se oculta después de 6 segundos
        }

        function mostrarCortinilla(callback) {
            bumper.classList.add('active');
            setTimeout(() => {
                callback(); // Carga el siguiente video mientras la cortinilla está en pantalla
                setTimeout(() => {
                    bumper.classList.remove('active');
                }, 800); // Desvanece la cortinilla después de iniciar el video
            }, 3000); // Tiempo que la cortinilla se queda en pantalla (3 segundos)
        }

        function cargarVideo(indice, startTime = 0) {
            const video = listaVideos[indice];
            const proximo = listaVideos[(indice + 1) % listaVideos.length];
            
            player.src = video.url;
            currentTitle.textContent = video.nombre;
            nextTitle.textContent = "Siguiente: " + proximo.nombre;
            
            player.load();

            // Esperar a que el video esté listo para asignarle el tiempo guardado
            player.onloadedmetadata = () => {
                if (startTime > 0) {
                    player.currentTime = startTime;
                    tiempoActual = startTime;
                } else {
                    tiempoActual = 0;
                }
                player.play().catch(e => console.log("Esperando interacción del usuario..."));
                mostrarEPG();
                
                // Limpiar el evento para que no se duplique
                player.onloadedmetadata = null;
            };
        }

        function iniciarCanal() {
            player.muted = false;
            btn.style.display = 'none';
            // Iniciar exactamente donde el usuario se quedó la última vez
            cargarVideo(indiceActual, tiempoGuardado);
        }

        // Cambio automático de video con Cortinilla
        player.onended = () => {
            indiceActual = (indiceActual + 1) % listaVideos.length;
            
            // Reiniciar el tiempo guardado para el nuevo video
            localStorage.setItem('nativux_index', indiceActual);
            localStorage.setItem('nativux_time', 0);
            tiempoActual = 0;

            // Mostrar cortinilla y luego cargar el siguiente
            mostrarCortinilla(() => {
                cargarVideo(indiceActual, 0);
            });
        };

        // Guardado constante y Bloqueos de seguridad (Anti-adelanto)
        player.ontimeupdate = () => { 
            if (!player.seeking) {
                tiempoActual = player.currentTime; 
                
                // Guardar progreso en la memoria del navegador
                localStorage.setItem('nativux_index', indiceActual);
                localStorage.setItem('nativux_time', tiempoActual);
            }
        };

        player.onseeking = () => { 
            // Si intenta saltar hacia adelante, lo regresa al tiempo real
            if (player.currentTime > tiempoActual + 1) {
                player.currentTime = tiempoActual; 
            }
        };

        window.addEventListener('keydown', (e) => { 
            if ([32, 37, 39].includes(e.keyCode)) e.preventDefault(); 
        });
        
        document.addEventListener('contextmenu', e => e.preventDefault());

    </script>
</body>
</html>
