<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NATIVUX TV</title>
    <style>
        body { margin: 0; background: #000; color: white; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; background: #000; }
        .logo { position: absolute; top: 30px; right: 40px; font-weight: bold; font-size: 24px; color: rgba(255,255,255,0.5); z-index: 15; }
        .btn-inicio { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; padding: 20px 40px; font-size: 22px; background: #ff0000; color: white; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="logo">NATIVUX TV</div>
        <video id="tvPlayer" playsinline autoplay title="Nativux Video Player">
            <source src="" type="video/mp4">
        </video>
        <button id="btnPlay" class="btn-inicio" onclick="iniciarCanal()">SINTONIZAR SEÑAL</button>
    </div>

    <script>
        var player = document.getElementById('tvPlayer');
        var btn = document.getElementById('btnPlay');

        // Lista de videos con el formato correcto para Dropbox
        var listaVideos = [
            { url: "https://dl.dropboxusercontent.com/scl/fi/cw3grhqcau2uu614oqqsf/y2mate.com-Betty-toon-estrella-estrellada_360p.mp4?rlkey=a5nimez2upz42bp7m871lrx2y" },
            { url: "https://dl.dropboxusercontent.com/scl/fi/4a1kkx6odi9t1mn32j73n/03x13-Bart-y-la-radio.mp4?rlkey=875yipktjp8d5jdcpcdp0nhh7" }
        ];

        function iniciarCanal() {
            btn.style.display = 'none';
            player.muted = false;
            
            // Prueba con el primer video
            var urlLimpia = listaVideos[0].url;
            
            // CAMBIO CLAVE: Usar dl.dropboxusercontent.com ayuda a evitar bloqueos en TVs viejas
            player.src = urlLimpia;
            player.load();
            
            // Intento de reproducción forzada
            var playPromise = player.play();
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    console.log("Reproduciendo...");
                }).catch(function(error) {
                    console.log("Error: " + error);
                    // Si falla, intentamos cargar de nuevo
                    player.load();
                    player.play();
                });
            }
        }

        player.onended = function() {
            // Reiniciar o pasar al siguiente
            iniciarCanal();
        };
    </script>
</body>
</html>
