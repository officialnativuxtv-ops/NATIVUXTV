<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NATIVUX TV</title>
    <style>
        /* Se simplificaron los estilos para evitar errores de renderizado en TV antiguas */
        body { margin: 0; background: #000; color: white; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .logo {
            position: absolute; top: 30px; right: 40px;
            font-weight: bold; font-size: 24px; color: rgba(255,255,255,0.5);
            z-index: 15; text-shadow: 2px 2px 4px #000;
        }

        .epg-guide {
            position: absolute; bottom: 50px; left: 50px;
            background: rgba(0, 0, 0, 0.9); color: white;
            padding: 20px; border-left: 6px solid #ff0000;
            z-index: 20; min-width: 300px; display: none;
        }

        .bumper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0b0b; color: #fff; display: none;
            justify-content: center; align-items: center;
            font-size: 35px; font-weight: bold; z-index: 25; text-transform: uppercase;
        }
        
        .bumper span { color: #ff0000; margin-left: 10px; }

        .btn-inicio { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            z-index: 30; padding: 20px 40px; font-size: 22px; 
            background: #ff0000; color: white; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 5px; 
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="logo">NATIVUX TV</div>
        
        <div class="bumper" id="bumper">Estás viendo <span>NATIVUX TV</span></div>

        <div class="epg-guide" id="epg">
            <div style="font-size: 12px; color: #aaa;">AHORA:</div>
            <div id="currentTitle" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">Cargando...</div>
            <div id="nextTitle" style="font-size: 14px; color: #00ff00; border-top: 1px solid #333; padding-top: 10px;">Siguiente: --</div>
        </div>
        
        <video id="tvPlayer" playsinline>
            <source src="" type="video/mp4">
        </video>

        <button id="btnPlay" class="btn-inicio">SINTONIZAR SEÑAL</button>
    </div>

    <script>
        // Se cambió a funciones tradicionales (function) porque webOS 3.9 suele fallar con => (Arrow Functions)
        var player = document.getElementById('tvPlayer');
        var epg = document.getElementById('epg');
        var currentTitle = document.getElementById('currentTitle');
        var nextTitle = document.getElementById('nextTitle');
        var btn = document.getElementById('btnPlay');
        var bumper = document.getElementById('bumper');

        var indiceActual = localStorage.getItem('nativux_index') ? parseInt(localStorage.getItem('nativux_index')) : 0;
        var tiempoGuardado = localStorage.getItem('nativux_time') ? parseFloat(localStorage.getItem('nativux_time')) : 0;
        var tiempoActual = 0;

        var listaVideos = [
            { nombre: "Betty Toon - Estrella Estrellada", url: "https://www.dropbox.com/scl/fi/cw3grhqcau2uu614oqqsf/y2mate.com-Betty-toon-estrella-estrellada_360p.mp4?rlkey=a5nimez2upz42bp7m871lrx2y&st=p2niircy&raw=1" },
            { nombre: "Los Simpsons, Cap13-Temp3", url: "https://www.dropbox.com/scl/fi/4a1kkx6odi9t1mn32j73n/03x13-Bart-y-la-radio.mp4?rlkey=875yipktjp8d5jdcpcdp0nhh7&st=yskrucx0&raw=1" },
            { nombre: "Huella de los Dinosaurios - Cap 1", url: "https://www.dropbox.com/scl/fi/crb2xdeb8xl2h6o4q4ea5/Huella-de-dinosaurios-Documental.mp4?rlkey=s3ak2vpqa70u9yryputyw1fg7&st=npi00kan&raw=1" },
            { nombre: "Saint Seiya - Alma de Oro (Completa)", url: "https://www.dropbox.com/scl/fi/ifgbbmvnpjn9k4i5btyon/Saint-Seiya-Alma-de-Oro-Serie-Completa-2018_360P.mp4?rlkey=zcy64m0ya1kj4e912al7g0fks&st=zqqkotiu&raw=1" }
            // ... Puedes reponer el resto de tu lista aquí igual que antes
        ];

        function mostrarEPG() {
            epg.style.display = 'block';
            setTimeout(function() {
                epg.style.display = 'none';
            }, 6000);
        }

        function cargarVideo(indice, startTime) {
            var videoInfo = listaVideos[indice];
            var proximo = listaVideos[(indice + 1) % listaVideos.length];
            
            player.src = videoInfo.url;
            currentTitle.innerHTML = videoInfo.nombre;
            nextTitle.innerHTML = "Siguiente: " + proximo.nombre;
            
            player.load();

            player.onloadedmetadata = function() {
                if (startTime > 0) { player.currentTime = startTime; }
                player.play();
                mostrarEPG();
            };
        }

        btn.onclick = function() {
            player.muted = false;
            btn.style.display = 'none';
            cargarVideo(indiceActual, tiempoGuardado);
        };

        player.onended = function() {
            indiceActual = (indiceActual + 1) % listaVideos.length;
            localStorage.setItem('nativux_index', indiceActual);
            localStorage.setItem('nativux_time', 0);
            
            bumper.style.display = 'flex';
            setTimeout(function() {
                cargarVideo(indiceActual, 0);
                setTimeout(function() { bumper.style.display = 'none'; }, 1000);
            }, 3000);
        };

        player.ontimeupdate = function() { 
            if (!player.seeking) {
                tiempoActual = player.currentTime; 
                localStorage.setItem('nativux_index', indiceActual);
                localStorage.setItem('nativux_time', tiempoActual);
            }
        };

        // Bloqueos de seguridad básicos
        document.oncontextmenu = function() { return false; };

    </script>
</body>
</html>
